name: PoolwatchLog
options:
  bundleIdPrefix: com.shimondeitel.poolwatchlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PoolwatchLog:
    type: application
    platform: iOS
    sources:
      - path: PoolwatchLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.poolwatchlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PoolwatchLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PoolwatchLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoolwatchLogTests
      - path: PoolwatchLog.storekit
    dependencies:
      - target: PoolwatchLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.poolwatchlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PoolwatchLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PoolwatchLogUITests
    dependencies:
      - target: PoolwatchLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.poolwatchlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PoolwatchLog:
    build:
      targets:
        PoolwatchLog: all
        PoolwatchLogTests: [test]
        PoolwatchLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PoolwatchLog.storekit
    test:
      config: Debug
      storeKitConfiguration: PoolwatchLog.storekit
      targets:
        - PoolwatchLogTests
        - PoolwatchLogUITests
    archive:
      config: Release
